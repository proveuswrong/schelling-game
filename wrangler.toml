name = "schelling-game"
main = "src/worker.js"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

[[durable_objects.bindings]]
name = "GAME_ROOM"
class_name = "GameRoom"

[[d1_databases]]
binding = "DB"
database_name = "schelling-game-db"
database_id = "04dc2aca-e1a2-4221-aa8a-53fc907ef96e"

[assets]
directory = "./public"
run_worker_first = ["/ws*", "/api/*"]

[[migrations]]
tag = "v1"
new_sqlite_classes = ["GameRoom"]
